define host {
    use                     linux-server
    host_name               intranet-portal-host
    alias                   Intranet Portal Kubernetes Application
    address                 host.docker.internal
}

define service {
    use                     generic-service
    host_name               intranet-portal-host
    service_description     Intranet Portal HTTP
    check_command           check_http!-p 8082
}